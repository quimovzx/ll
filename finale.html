<body class="bg-black text-white flex flex-col items-center justify-center h-screen">
    <div class="text-center" id="final-wish">
        <h1 class="text-6xl serif italic text-amber-500 mb-6">May Your Light Never Dim</h1>
        <p class="tracking-[0.5em] text-sm opacity-50 uppercase mb-12">A Formal Birthday Tribute</p>
        <button onclick="honor()" class="border border-white px-10 py-4 hover:bg-white hover:text-black transition duration-500">IGNITE THE CELEBRATION</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        function honor() {
            // Gold and White formal confetti
            var end = Date.now() + (3 * 1000);
            var colors = ['#d4af37', '#ffffff', '#c0c0c0'];

            (function frame() {
              confetti({ particleCount: 2, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
              confetti({ particleCount: 2, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });

              if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }
    </script>
</body>
